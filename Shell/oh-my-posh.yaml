# yaml-language-server: $schema=https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json

version: 3
auto: true
final_space: true

console_title_template: "{{if .Root}} :: root{{end}}{{.UserName}}@{{.HostName}} {{.Folder}}"
blocks:

    - type: prompt
      alignment: left
      segments:
        - type: python
          style: powerline
          powerline_symbol: ""
          foreground: gray
          background: p:purple
          template: "{{ if .Venv}}🐍 {{ .Venv }} {{ end }}"
        - type: rust
          style: powerline
          powerline_symbol: ""
          foreground: gray
          background: p:purple
          template: "🦀 {{ .Major }}.{{ .Minor }} "
        - type: path
          style: powerline
          powerline_symbol: ""
          foreground: white
          background: p:green
          properties:
            style: folder
        - type: git
          properties:
            display_stash_count: true
            display_status: true
            display_upstream_icon: true
            fetch_status: false
            fetch_upstream_icon: true
          style: powerline
          powerline_symbol: ""
          foreground: p:git-foreground
          background: p:git
          template: "{{ .HEAD }}"
          background_templates:
            - "{{ if or (.Working.Changed) (.Staging.Changed) }}p:git-modified{{ end }}"
            - "{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:git-diverged{{ end }}"
            - "{{ if gt .Ahead 0 }}p:git-ahead{{ end }}"
            - "{{ if gt .Behind 0 }}p:git-behind{{ end }}"

palette:
  git-foreground: "#0C2000"
  git: "#2BAB2F"
  git-modified: "#EFA268"
  git-diverged: "#FF4500"
  git-ahead: "#B388FF"
  git-behind: "#B388FF"
  red: "#FF0000"
  green: "#0f3e06"
  blue: "#0000FF"
  white: "#FFFFFF"
  black: "#111111"
  purple: "#482050"
